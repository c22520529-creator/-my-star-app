<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的追星小宇宙 ⭐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#3a2e4f;
    --ink-soft:#7a6f93;
    --paper:#fdf7ff;
    --card:#ffffff;
    --accent:#ff7eb6;
    --accent-2:#8e7bff;
    --gold:#ffc94d;
    --radius:22px;
    --shadow:0 10px 30px rgba(120,90,180,.14);
    font-size:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Noto Sans TC",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 15% 10%, rgba(255,126,182,.18), transparent 40%),
      radial-gradient(circle at 85% 20%, rgba(142,123,255,.16), transparent 45%),
      radial-gradient(circle at 50% 90%, rgba(255,201,77,.14), transparent 50%),
      var(--paper);
    min-height:100%;
  }
  .num{font-family:"Baloo 2","Noto Sans TC",sans-serif;}

  /* ---------- 登入畫面 ---------- */
  #loginView{
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:22px;padding:24px;text-align:center;
  }
  .logo{
    font-size:2.1rem;font-weight:900;letter-spacing:.04em;
  }
  .logo .star{display:inline-block;animation:twinkle 1.8s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{transform:scale(1) rotate(0deg);opacity:1}50%{transform:scale(1.25) rotate(12deg);opacity:.8}}
  .tagline{color:var(--ink-soft);font-size:1rem;max-width:300px;line-height:1.7;}
  .gbtn{
    display:inline-flex;align-items:center;gap:10px;
    background:#fff;border:2px solid #eadcff;border-radius:999px;
    padding:14px 26px;font-size:1.05rem;font-weight:700;color:var(--ink);
    cursor:pointer;box-shadow:var(--shadow);transition:transform .15s;
    font-family:inherit;
  }
  .gbtn:hover{transform:translateY(-2px);}
  .gbtn svg{width:22px;height:22px;}

  /* ---------- 主畫面 ---------- */
  #appView{display:none;max-width:880px;margin:0 auto;padding:20px 16px 90px;}
  header.topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:6px 4px 18px;
  }
  .hello{font-weight:900;font-size:1.25rem;}
  .hello small{display:block;font-weight:500;color:var(--ink-soft);font-size:.8rem;margin-top:2px;}
  .avatar-chip{display:flex;align-items:center;gap:10px;}
  .avatar-chip img{width:38px;height:38px;border-radius:50%;border:2px solid #fff;box-shadow:var(--shadow);}
  .linkbtn{
    background:none;border:none;color:var(--ink-soft);font-size:.8rem;
    cursor:pointer;text-decoration:underline;font-family:inherit;
  }

  /* 分頁 */
  .tabs{
    display:flex;gap:8px;background:#f2eafc;border-radius:999px;padding:5px;margin-bottom:22px;
  }
  .tab{
    flex:1;border:none;border-radius:999px;padding:11px 0;font-size:.98rem;font-weight:700;
    background:transparent;color:var(--ink-soft);cursor:pointer;transition:.2s;font-family:inherit;
  }
  .tab.active{background:#fff;color:var(--ink);box-shadow:0 4px 14px rgba(120,90,180,.18);}

  /* ---------- 偶像卡片 ---------- */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;}
  .idol-card{
    --bias:#ff7eb6;
    position:relative;background:var(--card);border-radius:var(--radius);
    padding:22px 20px 18px;box-shadow:var(--shadow);overflow:hidden;
    border-top:8px solid var(--bias);
    transition:transform .18s;
  }
  .idol-card:hover{transform:translateY(-4px) rotate(-.4deg);}
  .idol-card::after{
    content:"";position:absolute;inset:auto -30% -55% -30%;height:70%;
    background:radial-gradient(ellipse at center, color-mix(in srgb, var(--bias) 26%, transparent), transparent 70%);
    pointer-events:none;
  }
  .idol-head{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .idol-photo{
    width:58px;height:58px;border-radius:18px;object-fit:cover;
    border:3px solid var(--bias);background:color-mix(in srgb, var(--bias) 18%, #fff);
    display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0;
  }
  .idol-name{font-size:1.15rem;font-weight:900;line-height:1.3;word-break:break-all;}
  .idol-since{font-size:.75rem;color:var(--ink-soft);margin-top:2px;}
  .day-line{display:flex;align-items:baseline;gap:6px;position:relative;z-index:1;}
  .day-label{font-size:.85rem;font-weight:700;color:var(--bias);}
  .day-num{font-size:3rem;font-weight:800;color:var(--bias);line-height:1;}
  .day-unit{font-size:.9rem;color:var(--ink-soft);}
  .idol-stats{font-size:.78rem;color:var(--ink-soft);margin-top:10px;position:relative;z-index:1;}
  .card-actions{position:absolute;top:12px;right:12px;display:flex;gap:6px;z-index:2;}
  .mini-btn{
    width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;
    background:rgba(255,255,255,.85);box-shadow:0 2px 8px rgba(0,0,0,.08);font-size:.85rem;
  }

  .add-card{
    border:3px dashed #d9c9f5;border-radius:var(--radius);min-height:170px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
    color:var(--accent-2);font-weight:700;cursor:pointer;background:rgba(255,255,255,.45);
    transition:.2s;font-size:1rem;font-family:inherit;
  }
  .add-card:hover{background:#fff;}
  .add-card .plus{font-size:2rem;line-height:1;}

  /* ---------- 文章區 ---------- */
  .write-box{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:18px;margin-bottom:22px;
  }
  .write-box label{font-size:.85rem;font-weight:700;color:var(--ink-soft);display:block;margin-bottom:6px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  select,input[type=text],input[type=date],input[type=url],textarea{
    font-family:inherit;font-size:1rem;color:var(--ink);
    border:2px solid #ece2fb;border-radius:14px;padding:10px 12px;background:#fbf8ff;
    outline:none;transition:border .15s;
  }
  select:focus,input:focus,textarea:focus{border-color:var(--accent-2);}
  textarea{width:100%;min-height:130px;resize:vertical;margin-top:10px;line-height:1.8;}
  .count-bar{
    display:flex;justify-content:space-between;align-items:center;margin-top:10px;flex-wrap:wrap;gap:10px;
  }
  .count-pill{
    background:linear-gradient(90deg,#ffe3f0,#e9e3ff);
    border-radius:999px;padding:8px 16px;font-weight:700;font-size:.95rem;
  }
  .count-pill .num{font-size:1.25rem;color:var(--accent-2);}
  .primary-btn{
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    color:#fff;border:none;border-radius:999px;padding:12px 28px;
    font-size:1rem;font-weight:800;cursor:pointer;box-shadow:0 6px 18px rgba(214,107,196,.35);
    transition:transform .15s;font-family:inherit;
  }
  .primary-btn:hover{transform:translateY(-2px);}
  .primary-btn:disabled{opacity:.45;cursor:not-allowed;transform:none;}

  .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .chip{
    border:2px solid #e7dbfa;background:#fff;border-radius:999px;padding:7px 14px;
    font-size:.85rem;font-weight:700;color:var(--ink-soft);cursor:pointer;font-family:inherit;
  }
  .chip.active{border-color:var(--accent-2);color:var(--accent-2);background:#f3efff;}

  .post{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:16px 18px;margin-bottom:14px;border-left:6px solid var(--bias,#ccc);
  }
  .post-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;flex-wrap:wrap;}
  .post-to{font-size:.82rem;font-weight:800;}
  .post-to .badge{
    display:inline-block;padding:3px 10px;border-radius:999px;color:#fff;font-size:.75rem;
  }
  .post-meta{font-size:.72rem;color:var(--ink-soft);}
  .post-text{white-space:pre-wrap;line-height:1.85;font-size:.95rem;}
  .post-count{margin-top:8px;font-size:.75rem;color:var(--ink-soft);}
  .post .del{float:right;}

  .empty{
    text-align:center;color:var(--ink-soft);padding:40px 10px;line-height:2;
  }

  /* ---------- 小視窗 (Modal) ---------- */
  .overlay{
    display:none;position:fixed;inset:0;background:rgba(60,40,90,.35);
    backdrop-filter:blur(3px);z-index:50;align-items:center;justify-content:center;padding:18px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:#fff;border-radius:26px;padding:24px;width:100%;max-width:420px;
    box-shadow:0 20px 60px rgba(60,40,90,.3);max-height:90vh;overflow:auto;
  }
  .modal h3{font-size:1.2rem;font-weight:900;margin-bottom:16px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:.85rem;font-weight:700;color:var(--ink-soft);margin-bottom:6px;}
  .field input{width:100%;}
  .color-row{display:flex;gap:8px;flex-wrap:wrap;}
  .color-dot{
    width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;
    transition:.15s;
  }
  .color-dot.sel{border-color:var(--ink);transform:scale(1.12);}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
  .ghost-btn{
    background:#f3eefc;border:none;border-radius:999px;padding:12px 22px;
    font-weight:700;color:var(--ink-soft);cursor:pointer;font-family:inherit;font-size:.95rem;
  }
  .hint{font-size:.75rem;color:var(--ink-soft);margin-top:4px;}

  .toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(80px);
    background:var(--ink);color:#fff;padding:12px 22px;border-radius:999px;
    font-size:.9rem;font-weight:700;opacity:0;transition:.3s;z-index:99;pointer-events:none;
  }
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

  #setupWarn{
    display:none;max-width:560px;margin:30px auto;background:#fff7e8;border:2px solid #ffd98a;
    border-radius:18px;padding:18px 20px;line-height:1.9;font-size:.92rem;
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;}
  }
</style>
</head>

<!-- 登入畫面 -->
<div id="loginView">
  <div class="logo"><span class="star">⭐</span> 我的追星小宇宙</div>
  <p class="tagline">記住喜歡他的每一天,<br>也留下你寫給他的每一個字。</p>
  <button class="gbtn" id="googleBtn">
    <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.3 6.1 29.4 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.3 6.1 29.4 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.3 0-9.7-3.3-11.3-8l-6.5 5C9.6 39.6 16.3 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4.1 5.5l6.2 5.2C36.9 39.2 44 34 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>

<!-- 主畫面 -->

  <header class="topbar">
    <div class="hello">

<!-- 新增/編輯偶像的小視窗 -->
<div class="overlay" id="idolModal">
  <div class="modal">
    <h3 id="modalTitle">新增偶像 💖</h3>
    <div class="field">
      <label for="idolName">他的名字</label>

<div class="toast" id="toast"></div>

<script type="module">
/* ================== Firebase 連線(百寶店) ================== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, doc, addDoc, setDoc, deleteDoc,
  onSnapshot, query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg = window.FIREBASE_CONFIG;
const notReady = !cfg || String(cfg.apiKey).startsWith("請貼上");
if (notReady) document.getElementById("setupWarn").style.display = "block";

let auth, db, uid = null;
if (!notReady) {
  const app = initializeApp(cfg);
  auth = getAuth(app);
  db = getFirestore(app);
}

/* ================== 小工具 ================== */
const $ = id => document.getElementById(id);
const toast = msg => {
  const t = $("toast"); t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
};
// 算字數:把空格和換行拿掉,剩下的每個字都算 1 個
const countChars = s => s.replace(/\s/g, "").length;
// 算「喜歡第幾天」:從紀念日那天算第 1 天
const daysSince = dateStr => {
  const start = new Date(dateStr + "T00:00:00");
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.floor((today - start) / 86400000) + 1;
};
const fmtDate = d => `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
const esc = s => s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

const COLORS = ["#ff7eb6","#ff5e5e","#ff9b3d","#ffc94d","#7ed957","#4dd3c9","#5ea8ff","#8e7bff","#d77bff","#9aa0ad"];

/* ================== 登入 / 登出(警衛) ================== */
$("googleBtn").onclick = async () => {
  if (notReady) { toast("要先貼上 Firebase 鑰匙卡喔!"); return; }
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch (e) { toast("登入沒成功,再試一次看看"); console.error(e); }
};
$("logoutBtn").onclick = () => signOut(auth);

if (!notReady) onAuthStateChanged(auth, user => {
  if (user) {
    uid = user.uid;
    $("helloName").textContent = `嗨,${user.displayName || "小粉絲"}!`;
    $("userPhoto").src = user.photoURL || "";
    $("loginView").style.display = "none";
    $("appView").style.display = "block";
    listenIdols(); listenPosts();
  } else {
    uid = null;
    $("loginView").style.display = "flex";
    $("appView").style.display = "none";
  }
});

/* ================== 分頁切換 ================== */
document.querySelectorAll(".tab").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    $("idolsTab").style.display = btn.dataset.tab === "idols" ? "" : "none";
    $("postsTab").style.display = btn.dataset.tab === "posts" ? "" : "none";
  };
});

/* ================== 偶像資料(圖書館的資料夾) ================== */
let idols = [];      // {id, name, color, emoji, photoUrl, startDate}
let posts = [];      // {id, idolId, text, charCount, createdAt}
let editingId = null;
let filterId = "all";

function listenIdols() {
  const q = query(collection(db, "users", uid, "idols"), orderBy("startDate"));
  onSnapshot(q, snap => {
    idols = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderCards(); renderIdolSelect(); renderFilter(); renderPosts();
  });
}
function listenPosts() {
  const q = query(collection(db, "users", uid, "posts"), orderBy("createdAt", "desc"));
  onSnapshot(q, snap => {
    posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderPosts(); renderCards();
  });
}

/* ---------- 卡片畫面 ---------- */
function renderCards() {
  const grid = $("cardGrid");
  grid.innerHTML = "";
  idols.forEach(idol => {
    const days = daysSince(idol.startDate);
    const myPosts = posts.filter(p => p.idolId === idol.id);
    const totalWords = myPosts.reduce((s,p) => s + (p.charCount||0), 0);
    const card = document.createElement("div");
    card.className = "idol-card";
    card.style.setProperty("--bias", idol.color);
    const photo = idol.photoUrl
      ? `<img class="idol-photo" src="${esc(idol.photoUrl)}" alt="${esc(idol.name)}">`
      : `<div class="idol-photo">${esc(idol.emoji || "💖")}</div>`;
    card.innerHTML = `
      <div class="card-actions">
        <button class="mini-btn" title="編輯" data-edit="${idol.id}">✏️</button>
        <button class="mini-btn" title="刪除" data-del="${idol.id}">🗑️</button>
      </div>
      <div class="idol-head">
        ${photo}
        <div>
          <div class="idol-name">${esc(idol.name)}</div>
          <div class="idol-since">${idol.startDate.replaceAll("-","/")} 入坑</div>
        </div>
      </div>
      <div class="day-line">
        <span class="day-label">喜歡他</span>
        <span class="day-num num">${days}</span>
        <span class="day-unit">天了</span>
      </div>
      <div class="idol-stats">📔 寫給他 ${myPosts.length} 篇.共 ${totalWords} 個字</div>`;
    grid.appendChild(card);
  });

  const add = document.createElement("button");
  add.className = "add-card";
  add.innerHTML = `<span class="plus">＋</span>新增一位偶像`;
  add.onclick = () => openModal();
  grid.appendChild(add);

  grid.querySelectorAll("[data-edit]").forEach(b => b.onclick = () => openModal(b.dataset.edit));
  grid.querySelectorAll("[data-del]").forEach(b => b.onclick = async () => {
    const idol = idols.find(i => i.id === b.dataset.del);
    if (confirm(`確定要刪掉「${idol.name}」嗎?他的卡片會不見喔!`)) {
      await deleteDoc(doc(db, "users", uid, "idols", idol.id));
      toast("已經刪掉了");
    }
  });
}

/* ---------- 新增 / 編輯小視窗 ---------- */
let pickedColor = COLORS[0];
function buildColorRow() {
  const row = $("colorRow"); row.innerHTML = "";
  COLORS.forEach(c => {
    const dot = document.createElement("div");
    dot.className = "color-dot" + (c === pickedColor ? " sel" : "");
    dot.style.background = c;
    dot.onclick = () => { pickedColor = c; buildColorRow(); };
    row.appendChild(dot);
  });
}
function openModal(id = null) {
  editingId = id;
  const idol = idols.find(i => i.id === id);
  $("modalTitle").textContent = idol ? "編輯偶像 ✏️" : "新增偶像 💖";
  $("idolName").value = idol?.name || "";
  $("idolDate").value = idol?.startDate || "";
  $("idolEmoji").value = idol?.emoji || "";
  $("idolPhoto").value = idol?.photoUrl || "";
  pickedColor = idol?.color || COLORS[0];
  buildColorRow();
  $("idolModal").classList.add("show");
}
$("cancelIdolBtn").onclick = () => $("idolModal").classList.remove("show");
$("saveIdolBtn").onclick = async () => {
  const name = $("idolName").value.trim();
  const startDate = $("idolDate").value;
  if (!name) { toast("要先填名字喔!"); return; }
  if (!startDate) { toast("要選入坑紀念日喔!"); return; }
  const data = {
    name, startDate, color: pickedColor,
    emoji: $("idolEmoji").value.trim(),
    photoUrl: $("idolPhoto").value.trim()
  };
  if (editingId) await setDoc(doc(db, "users", uid, "idols", editingId), data, { merge: true });
  else await addDoc(collection(db, "users", uid, "idols"), { ...data, createdAt: serverTimestamp() });
  $("idolModal").classList.remove("show");
  toast("存好了 ✨");
};

/* ================== 文章 + 字數統計 ================== */
$("postText").addEventListener("input", () => {
  $("liveCount").textContent = countChars($("postText").value);
});

function renderIdolSelect() {
  const sel = $("postIdol");
  sel.innerHTML = idols.length
    ? idols.map(i => `<option value="${i.id}">寫給 ${esc(i.name)}</option>`).join("")
    : `<option value="">先去新增一位偶像吧!</option>`;
}

$("savePostBtn").onclick = async () => {
  const text = $("postText").value.trim();
  const idolId = $("postIdol").value;
  if (!idolId) { toast("先去「偶像卡片」新增一位偶像喔!"); return; }
  if (!text) { toast("還沒寫東西喔!"); return; }
  await addDoc(collection(db, "users", uid, "posts"), {
    idolId, text, charCount: countChars(text), createdAt: serverTimestamp()
  });
  $("postText").value = ""; $("liveCount").textContent = "0";
  toast("存進日記本了 📔");
};

function renderFilter() {
  const row = $("filterRow");
  row.innerHTML = "";
  const mk = (id, label) => {
    const b = document.createElement("button");
    b.className = "chip" + (filterId === id ? " active" : "");
    b.textContent = label;
    b.onclick = () => { filterId = id; renderFilter(); renderPosts(); };
    row.appendChild(b);
  };
  mk("all", "全部");
  idols.forEach(i => mk(i.id, i.name));
}

function renderPosts() {
  const list = $("postList");
  const shown = posts.filter(p => filterId === "all" || p.idolId === filterId);
  if (!shown.length) {
    list.innerHTML = `<div class="empty">這裡還空空的~<br>寫下第一篇給他的話吧 ✍️</div>`;
    return;
  }
  list.innerHTML = "";
  shown.forEach(p => {
    const idol = idols.find(i => i.id === p.idolId);
    const div = document.createElement("div");
    div.className = "post";
    div.style.setProperty("--bias", idol?.color || "#ccc");
    const when = p.createdAt?.toDate ? fmtDate(p.createdAt.toDate()) : "剛剛";
    div.innerHTML = `
      <div class="post-head">
        <span class="post-to">寫給 <span class="badge" style="background:${idol?.color||"#999"}">${esc(idol?.name || "?")}</span></span>
        <span class="post-meta">${when} <button class="mini-btn del" data-delpost="${p.id}" title="刪除">🗑️</button></span>
      </div>
      <div class="post-text">${esc(p.text)}</div>
      <div class="post-count">這篇共 ${p.charCount} 個字</div>`;
    list.appendChild(div);
  });
  list.querySelectorAll("[data-delpost]").forEach(b => b.onclick = async () => {
    if (confirm("確定要刪掉這篇嗎?")) {
      await deleteDoc(doc(db, "users", uid, "posts", b.dataset.delpost));
      toast("刪掉了");
    }
  });
}
</script>
</body>
</html>
